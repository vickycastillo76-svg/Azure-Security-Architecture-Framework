name: "Compliance & Security Audit"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-audit:
    name: "Terraform Security Scan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: HashiCorp Setup
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false # Preventing it from trying to connect to the real server.

      - name: Terraform Init (Offline Mode)
        run: terraform init -backend=false
        working-directory: ./infrastructure-as-code-azure

      - name: Security & Syntax Compliance Check
        run: terraform validate
        working-directory: ./infrastructure-as-code-azure
